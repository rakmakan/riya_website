<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Animation Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .canvas-wrapper {
            width: 100%;
            height: 400px;
            position: relative;
            border: 1px dashed #ccc;
            margin: 20px 0;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow: auto;
            white-space: pre-wrap;
        }
        .log {
            margin-top: 20px;
            padding: 10px;
            background: #f9f9f9;
            border: 1px solid #eee;
        }
        .btn {
            padding: 8px 16px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Canvas Animation Test</h1>
    <p>This page tests if the canvas animation from "The Gap" section works properly.</p>

    <div class="canvas-wrapper">
        <canvas id="scatterCanvas" width="400" height="400"></canvas>
    </div>

    <button class="btn" id="testBtn">Test Animation</button>
    <div class="log" id="log">Console output will appear here...</div>

    <h2>Animation Code</h2>
    <pre id="animationCode"></pre>

    <script>
        // Override console.log to capture output
        const originalConsoleLog = console.log;
        const logDiv = document.getElementById('log');
        
        console.log = function() {
            const args = Array.from(arguments);
            originalConsoleLog.apply(console, args);
            
            const message = args.map(arg => {
                if (typeof arg === 'object') {
                    return JSON.stringify(arg, null, 2);
                }
                return arg;
            }).join(' ');
            
            logDiv.innerHTML += `<div>${message}</div>`;
        };
        
        // Test button logic
        document.getElementById('testBtn').addEventListener('click', function() {
            logDiv.innerHTML = ''; // Clear previous logs
            console.log('Testing canvas animation...');
            
            // Basic canvas test
            const canvas = document.getElementById('scatterCanvas');
            if (!canvas) {
                console.log('ERROR: Canvas element not found!');
                return;
            }
            
            console.log('Canvas element found:', canvas);
            
            try {
                const ctx = canvas.getContext('2d');
                console.log('Canvas context created successfully');
                
                // Test drawing something
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0066cc';
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI * 2);
                ctx.fill();
                
                // Create some particles
                const particles = [];
                const particleCount = 50;
                
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: Math.random() * 3 + 1,
                        color: `rgba(${Math.floor(Math.random() * 100)}, ${Math.floor(Math.random() * 100)}, ${Math.floor(Math.random() * 255)}, 0.7)`,
                        speedX: (Math.random() * 2 - 1),
                        speedY: (Math.random() * 2 - 1)
                    });
                }
                
                console.log(`Created ${particles.length} particles for animation`);
                
                // Basic animation loop
                let animationFrameId;
                
                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    particles.forEach(particle => {
                        particle.x += particle.speedX;
                        particle.y += particle.speedY;
                        
                        // Bounce off edges
                        if (particle.x < 0 || particle.x > canvas.width) {
                            particle.speedX *= -1;
                        }
                        if (particle.y < 0 || particle.y > canvas.height) {
                            particle.speedY *= -1;
                        }
                        
                        // Draw particle
                        ctx.beginPath();
                        ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                        ctx.fillStyle = particle.color;
                        ctx.fill();
                    });
                    
                    animationFrameId = requestAnimationFrame(animate);
                }
                
                // Start animation
                animate();
                console.log('Animation started successfully');
                
                // Stop after 5 seconds to prevent infinite running
                setTimeout(() => {
                    cancelAnimationFrame(animationFrameId);
                    console.log('Animation stopped after 5 seconds');
                }, 5000);
                
            } catch (error) {
                console.log('ERROR with canvas:', error.message);
            }
        });
        
        // Fetch the actual animation code from index.php to display
        fetch('/Users/rakshitmakan/Documents/riya_website/index.php')
            .then(response => response.text())
            .then(code => {
                // Extract canvas animation code
                const match = code.match(/\/\/ Canvas Animation for The Gap section.*?\/\/ Intersection Observer for fade-in effects/s);
                if (match) {
                    document.getElementById('animationCode').textContent = match[0];
                } else {
                    document.getElementById('animationCode').textContent = 'Could not extract animation code';
                }
            })
            .catch(error => {
                document.getElementById('animationCode').textContent = 'Error fetching code: ' + error.message;
            });
    </script>
</body>
</html>
